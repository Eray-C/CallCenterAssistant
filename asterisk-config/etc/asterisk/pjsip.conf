;-------------------------------- PrivateDial ----------------------------------
; Filename: pjsip.conf
; This file is an Asterisk configuration file, part of the PrivateDial suite.
; It is loaded by the chan_pjsip.so module.
;

;-------------------------------- global ---------------------------------------

[global]
type = global
user_agent = Platform PBX

;-------------------------------- includes -------------------------------------

#tryinclude pjsip_transport.conf
#tryinclude pjsip_wizard.conf

;-------------------------------- WebRTC Browser Endpoint ----------------------
; CallCenterAssistant UI - browser-based JsSIP client

[webrtc-user]
type = endpoint
transport = ws
context = from-internal
disallow = all
allow = ulaw
allow = opus
dtls_auto_generate_cert = yes
webrtc = yes
use_avpf = yes
media_use_received_transport = yes
rtcp_mux = yes
ice_support = yes
auth = webrtc-user-auth
aors = webrtc-user
callerid = WebRTC User <1000>

[webrtc-user-auth]
type = auth
auth_type = userpass
username = webrtc-user
password = webrtc1234

[webrtc-user]
type = aor
max_contacts = 5
remove_existing = yes

; Linphone Mobile Endpoint
[1001]
type = endpoint
transport = udp
context = from-internal
disallow = all
allow = ulaw
allow = opus
auth = 1001-auth
aors = 1001
callerid = Linphone User <1001>

[1001-auth]
type = auth
auth_type = userpass
username = 1001
password = telefon1234

[1001]
type = aor
max_contacts = 1
remove_existing = yes
